name-template: "v$NEXT_PRERELEASE_VERSION"
tag-template: "v$NEXT_PRERELEASE_VERSION"

change-template: "- #$NUMBER $TITLE @$AUTHOR"
sort-direction: ascending
prerelease: true
prerelease-identifier: "beta"

categories:
  - title: "🚨 Breaking changes"
    label: "breaking-change"

  - title: "✨ New features"
    label: "new-feature"

  - title: "🐛 Bug fixes"
    label: "bugfix"

  - title: "🚀 Enhancements"
    labels:
      - "enhancement"
      - "refactor"
      - "performance"

  - title: "🧰 Maintenance"
    labels:
      - "maintenance"
      - "ci"
      - "tests"

  - title: "📚 Documentation"
    labels:
      - "documentation"

  - title: "⬆️ Dependency updates"
    collapse-after: 1
    labels:
      - "dependencies"

version-resolver:
  major:
    labels:
      - "breaking-change"
  minor:
    labels:
      - "new-feature"
  patch:
    labels:
      - "bugfix"
      - "ci"
      - "dependencies"
      - "documentation"
      - "enhancement"
      - "performance"
      - "refactor"
      - "tests"
  default: patch

template: |
  ## What's changed

  $CHANGES
